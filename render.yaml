databases:
  - name: keepin-db
    databaseName: keepin
    user: keepin

services:
  - type: web
    name: keepin-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: KEEPIN_DATABASE_URL
        fromDatabase:
          name: keepin-db
          property: connectionString
