databases:
  - name: keepin-db
    plan: free
    databaseName: keepin
    user: keepin

services:
  - type: web
    name: keepin-api
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: KEEPIN_DATABASE_URL
        fromDatabase:
          name: keepin-db
          property: connectionString
